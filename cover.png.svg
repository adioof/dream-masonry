<svg width="1000" height="420" xmlns="http://www.w3.org/2000/svg">
  <rect width="1000" height="420" fill="#0a0a0b"/>
  
  <!-- Masonry grid visualization -->
  <g transform="translate(50, 40)">
    <!-- Col 1 -->
    <rect x="0" y="0" width="120" height="160" rx="8" fill="#6c63ff" opacity="0.8"/>
    <rect x="0" y="170" width="120" height="100" rx="8" fill="#a78bfa" opacity="0.6"/>
    <rect x="0" y="280" width="120" height="120" rx="8" fill="#6c63ff" opacity="0.4"/>
    <!-- Col 2 -->
    <rect x="130" y="0" width="120" height="100" rx="8" fill="#a78bfa" opacity="0.6"/>
    <rect x="130" y="110" width="120" height="180" rx="8" fill="#6c63ff" opacity="0.7"/>
    <rect x="130" y="300" width="120" height="80" rx="8" fill="#a78bfa" opacity="0.5"/>
    <!-- Col 3 -->
    <rect x="260" y="0" width="120" height="200" rx="8" fill="#6c63ff" opacity="0.5"/>
    <rect x="260" y="210" width="120" height="120" rx="8" fill="#a78bfa" opacity="0.7"/>
  </g>
  
  <!-- Text -->
  <text x="520" y="140" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="52" font-weight="800" fill="#e8e8ed">dream-masonry</text>
  <text x="520" y="190" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" fill="#8888a0">Virtualized masonry grid for React</text>
  
  <text x="520" y="250" font-family="monospace" font-size="18" fill="#22c55e">✓ 10K items at 60fps</text>
  <text x="520" y="280" font-family="monospace" font-size="18" fill="#22c55e">✓ Built-in infinite scroll</text>
  <text x="520" y="310" font-family="monospace" font-size="18" fill="#22c55e">✓ 13KB · Zero dependencies</text>
  <text x="520" y="340" font-family="monospace" font-size="18" fill="#22c55e">✓ Custom scroll containers</text>
  
  <text x="520" y="390" font-family="monospace" font-size="16" fill="#6c63ff">npm install dream-masonry</text>
</svg>
